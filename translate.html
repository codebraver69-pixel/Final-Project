        <button id="themeChange" class="themechange">🌙</button>
    </header>
    <main id="translatorPage">
        <div class="cardcurrent">
            <h2>Language Translator</h2>
            <label>Languages:</label>
            <select id="languagemerge">
                <option value="en|es">English to Spanish</option>
                <option value="es|en">Spanish to English</option>
                <option value="en|fr">English to French</option>
                <option value="fr|en">French to English</option>
                <option value="en|de">English to German</option>
            </select>
            <textarea id="sourceText" placeholder="Enter text to translate..."></textarea>
            <button id="translatebtn" class="btny">Translate Text</button>
            <textarea id="translatedText" placeholder="Translated text will appear here" readonly></textarea>
            <button class="btny save-btn" onclick="saveToFavs('translation',document.getElementById('translatedText').value)">Save To Favorites</button>
        </div>
    </main>



    <script src="script.js"></script>
